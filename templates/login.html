{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<section class="two-col">
    <div class="panel">
        <p class="feature-meta">Account access</p>
        <h1 class="page-title">Login</h1>
        <p class="lead">Enter your username and password to continue into SoulSpeak.</p>
    </div>

    <div class="panel">
        <form method="POST" action="{{ url_for('login') }}">
            <div>
                <label for="username">Username</label>
                <input id="username" type="text" name="username" required>
            </div>
            <div>
                <label for="password">Password</label>
                <input id="password" type="password" name="password" required>
            </div>
            <button type="submit">Login</button>
        </form>
        <p class="muted" style="margin-top: 16px;">
            No account yet? <a href="{{ url_for('register') }}" style="color: var(--primary); font-weight: 700;">Register here</a>
        </p>
    </div>
</section>
{% endblock %}
