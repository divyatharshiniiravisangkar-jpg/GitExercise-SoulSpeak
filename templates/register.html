{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<section class="two-col">
    <div class="panel">
        <p class="feature-meta">New account</p>
        <h1 class="page-title">Register</h1>
        <p class="lead">Create your SoulSpeak profile to unlock private diary entries, chat support, and mood tracking.</p>
    </div>

    <div class="panel">
        <form method="POST" action="{{ url_for('register') }}">
            <div>
                <label for="username">Username</label>
                <input id="username" type="text" name="username" required>
            </div>
            <div>
                <label for="email">Email</label>
                <input id="email" type="email" name="email" required>
            </div>
            <div>
                <label for="password">Password</label>
                <input id="password" type="password" name="password" required>
            </div>
            <button type="submit">Create Account</button>
        </form>
        <p class="muted" style="margin-top: 16px;">
            Already registered? <a href="{{ url_for('login') }}" style="color: var(--primary); font-weight: 700;">Login here</a>
        </p>
    </div>
</section>
{% endblock %}
