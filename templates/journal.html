<!DOCTYPE html>
<html>
<head>
    <title>SoulSpeak Journal</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80%;
            margin: auto;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        .journal-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            cursor: pointer;
        }

        .entry {
            background: #ffffff;
            padding: 15px;
            border-left: 5px solid #4CAF50;
            margin-bottom: 10px;
            border-radius: 5px;
        }

        .date {
            font-size: 12px;
            color: gray;
        }

        .logout {
            display: block;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>📔 Welcome, {{ user }}</h2>

    <!-- Journal Input -->
    <div class="journal-box">
        <h3>Write Your Journal</h3>

        <form method="POST" action="/diary">
            <textarea name="content" placeholder="How are you feeling today?" required></textarea>
            <button type="submit">Save Entry</button>
        </form>
    </div>

    <!-- Journal Entries -->
    <h3>Your Journal Entries</h3>

    {% for entry in entries %}
        <div class="entry">
            <p>{{ entry["content"] }}</p>
            <p class="date">Saved entry</p>
        </div>
    {% else %}
        <p>No journal entries yet.</p>
    {% endfor %}

    <a class="logout" href="/logout">Logout</a>

</div>

</body>
</html>
