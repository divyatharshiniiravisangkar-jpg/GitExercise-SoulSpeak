<h2>My Private Journal</h2>
<form method="POST">
    <textarea name="content" placeholder="How are you feeling today?" required style="width:100%; height:100px;"></textarea><br>
    <button type="submit">Save Entry</button>
</form>

<hr>

<h3>Past Entries</h3>
{% for post in posts %}
<div style="margin-bottom:20px; padding:10px; border:1px solid #eee;">
    <strong>{{ post.date }}</strong> - <span>{{ post.sentiment }}</span>
    <p>{{ post.content }}</p>
</div>
{% else %}
<p>No entries yet. Start writing!</p>
{% endfor %}

<a href="/dashboard">Back to Dashboard</a>
