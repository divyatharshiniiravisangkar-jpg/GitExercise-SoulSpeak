<!DOCTYPE html>

</head>
<body>

<h2>Admin Login</h2>

<p>Only authorized admin can access this page.</p>

<form method="POST" action="/admin_login">

    <input type="text" name="username" required>

    <br><br>

</form>

<br>

<p>
    <a href="/admin_forgot_password">Forgot Password?</a>
</p>

<hr>

<p><a href="/">Back to Home</a></p>

</body>
</html>
