<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SoulSpeak{% endblock %}</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f7f9fc;
            color: #222;
            margin: 0;
            padding: 20px;
        }
        a {
            color: #2c7be5;
            text-decoration: none;
        }
        nav {
            margin-bottom: 18px;
        }
        .flashes {
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
        }
        .flashes li {
            background: #fff7c2;
            border: 1px solid #f0e6a6;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 6px;
        }
        .chat-box, .entries {
            background: #ffffff;
            border-radius: 10px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .message {
            padding: 12px 14px;
            border-radius: 10px;
            background: #eef4ff;
            margin-bottom: 12px;
        }
        .message.admin {
            background: #eaf8ed;
            border-left: 4px solid #34a853;
        }
        .message strong {
            display: block;
            margin-bottom: 6px;
        }
        .reply-form,
        .send-form,
        .diary-form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 12px 0 0 0;
        }
        input[type="text"], input[type="email"], input[type="password"], textarea {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #ccd6dd;
            border-radius: 8px;
            min-width: 200px;
        }
        button {
            background: #2c7be5;
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover {
            background: #1b5fbb;
        }
        .entry-card {
            padding: 14px;
            border: 1px solid #e4e7eb;
            border-radius: 10px;
            margin-bottom: 12px;
            background: white;
        }
        .entry-meta {
            font-size: 0.9em;
            color: #6b7280;
            margin-bottom: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            text-align: left;
        }
        th {
            background: #f3f4f6;
        }
        .note {
            color: #555;
            font-size: 0.95em;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <ul class="flashes">
                {% for message in messages %}
                    <li>{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</body>
</html>
